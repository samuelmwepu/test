<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Moderne</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 600px;
            width: 100%;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            animation: slideDown 0.6s ease-out;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
            animation: fadeIn 0.8s ease-out;
        }

        .content {
            padding: 40px 30px;
        }

        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.2);
        }

        .card-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .card h3 {
            color: #333;
            font-size: 1.2em;
            margin-bottom: 8px;
        }

        .card p {
            color: #666;
            font-size: 0.9em;
        }

        .button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
            font-weight: 600;
        }

        .button:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .button:active {
            transform: scale(0.98);
        }

        .footer {
            background: #f9f9f9;
            padding: 20px;
            text-align: center;
            color: #999;
            font-size: 0.9em;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .counter {
            background: white;
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }

        .counter p {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .counter-value {
            font-size: 2em;
            color: #764ba2;
            font-weight: bold;
            margin: 15px 0;
        }

        .counter-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .counter-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .counter-btn:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ Bienvenue</h1>
            <p>Une page moderne et interactive</p>
        </div>

        <div class="content">
            <div class="cards">
                <div class="card">
                    <div class="card-icon">💻</div>
                    <h3>Design</h3>
                    <p>Moderne et épuré</p>
                </div>
                <div class="card">
                    <div class="card-icon">⚡</div>
                    <h3>Rapide</h3>
                    <p>Optimisé et fluide</p>
                </div>
                <div class="card">
                    <div class="card-icon">🎨</div>
                    <h3>Beau</h3>
                    <p>Coloré et attractif</p>
                </div>
                <div class="card">
                    <div class="card-icon">📱</div>
                    <h3>Responsive</h3>
                    <p>Fonctionne partout</p>
                </div>
            </div>

            <button class="button" onclick="showMessage()">Clique-moi ! 🚀</button>

            <div class="counter">
                <p>Compte à rebours cool</p>
                <div class="counter-value" id="counterDisplay">0</div>
                <div class="counter-buttons">
                    <button class="counter-btn" onclick="decrementCounter()">−</button>
                    <button class="counter-btn" onclick="resetCounter()">Réinitialiser</button>
                    <button class="counter-btn" onclick="incrementCounter()">+</button>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>✨ Créée avec amour en 2026 ✨</p>
        </div>
    </div>

    <script>
        let counter = 0;

        function showMessage() {
            alert('🎉 Bravo ! Tu as cliqué sur le bouton !');
        }

        function incrementCounter() {
            counter++;
            updateCounter();
        }

        function decrementCounter() {
            counter--;
            updateCounter();
        }

        function resetCounter() {
            counter = 0;
            updateCounter();
        }

        function updateCounter() {
            document.getElementById('counterDisplay').textContent = counter;
        }
    </script>
</body>
</html>
